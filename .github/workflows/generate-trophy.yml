name: Generate Profile Trophy

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/generate-trophy.yml"

jobs:
  generate:
    name: Generate trophy SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: qoomon/github-profile-trophy@master
        with:
          username: BcKmini
          theme: dark_lover
          column: 4
          row: 2
          margin_w: 5
          no_frame: true
          no_bg: true
          output_path: ./assets/generated/trophy.svg

      - name: Bust README image cache
        run: |
          TS=$(date +%s)
          sed -i -E "s#(assets/generated/trophy\.svg)(\?v=[0-9]+)?\"#\1?v=${TS}\"#" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/trophy.svg README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update trophy SVG [skip ci]"
            git push
          fi
